id: credential-theft
name: Credential Theft Response
severity: critical
description: |
    Response procedure for detections indicating credential material was
    directly accessed or extracted for offline cracking or replay - LSASS
    memory access/dumping, DCSync replication abuse, Kerberoasting, and
    AS-REP Roasting. Any of these can hand an attacker domain-wide
    credentials (including krbtgt via DCSync), so treat confirmed
    detections as a high-priority incident.
techniques:
    - T1003.001
    - T1003.006
    - T1218.011
    - T1558.003
    - T1558.004
triggers:
    - LSASS
    - lsass
    - DCSync
    - Kerberoast
    - AS-REP
    - asrep
    - comsvcs
    - Active Directory Replication Rights Abuse
phases:
    triage:
        - "Identify the source host and account context of the alert (process owner for LSASS access/dump; SubjectUserName for DCSync 4662; TargetUserName/ServiceName for 4769/4768 Kerberos requests)."
        - "Confirm whether the source process/account is expected (EDR/backup/AD tooling) or unrecognized - check parent process, command line, and signer for LSASS access/dump alerts."
        - "For DCSync (4662): confirm SubjectUserName is not a legitimate Domain Controller or an explicitly authorized sync account (e.g. Azure AD Connect)."
        - "For Kerberoasting/AS-REP Roasting: identify which service/user accounts were targeted and check whether those accounts hold privileged group membership."
    containment:
        - "Isolate the source host from the network (EDR isolation or switch port disable) if the access/dump appears unauthorized."
        - "Disable or reset credentials for any account confirmed or suspected to have been dumped, replicated, or roasted, prioritizing privileged and service accounts."
        - "If DCSync was confirmed, assume krbtgt may have been retrieved - plan for a krbtgt double reset (see eradication)."
        - "Revoke active sessions/tokens for affected accounts where possible."
    eradication:
        - "Remove any tooling (Mimikatz, procdump, comsvcs invocations, custom scripts) and persistence found on the source host."
        - "Reset passwords for all affected accounts; for suspected DCSync, perform a krbtgt double-reset (two resets, spaced roughly a day apart, to invalidate outstanding Kerberos tickets without breaking trust relationships)."
        - "Review and tighten replication rights (DS-Replication-Get-Changes / DS-Replication-Get-Changes-All) to only Domain Controllers and explicitly authorized sync accounts."
        - "For accounts with Kerberos pre-authentication disabled (AS-REP Roasting), re-enable pre-authentication unless there is a documented, reviewed exception."
        - "Rotate service account passwords for any account with an exposed SPN that was roasted, and prefer gMSA accounts where possible going forward."
    recovery:
        - "Re-enable network access for the source host only after it has been reimaged or fully verified clean."
        - "Monitor affected accounts closely for reuse attempts (unexpected logons, privilege changes) for at least the following 1-2 weeks."
        - "Confirm scan_evtx / detection://rules coverage caught the activity end-to-end; use suggest_rule to file a gap if any part of the chain was missed."
references:
    - https://attack.mitre.org/techniques/T1003/001/
    - https://attack.mitre.org/techniques/T1003/006/
    - https://attack.mitre.org/techniques/T1558/003/
    - https://attack.mitre.org/techniques/T1558/004/

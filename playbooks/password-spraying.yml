id: password-spraying
name: Password Spraying Response
severity: medium
description: |
    Response procedure for detections of password-spraying activity -
    execution of known spray tooling (DomainPasswordSpray, MSOLSpray,
    TREVORspray, o365spray, Spray365, kerbrute) or a pattern of failed
    logons across many accounts from a single source using one or a small
    set of common passwords.
techniques:
    - T1110.003
triggers:
    - Password Spray
    - password_spray
    - DomainPasswordSpray
    - MSOLSpray
    - TREVORspray
    - o365spray
    - Spray365
    - kerbrute
phases:
    triage:
        - "Identify the source host/IP and the tool or process that generated the alert."
        - "Cross-reference EventID 4625 failures around the same time window to estimate how many distinct accounts were targeted and whether any attempt succeeded (4624 from the same source shortly after)."
        - "Check whether any targeted account subsequently authenticated successfully from the same or a new source - that account's password should be treated as compromised."
    containment:
        - "Block or rate-limit the source IP at the perimeter/identity provider if externally sourced (common for O365/Azure AD spraying)."
        - "Isolate the source host if internal."
        - "Force a password reset for any account that authenticated successfully during or shortly after the spray window."
    eradication:
        - "Remove spray tooling from the source host if internal."
        - "Review and enforce account lockout / smart lockout thresholds and MFA policy to reduce spray effectiveness going forward."
    recovery:
        - "Monitor previously targeted accounts for further authentication attempts."
        - "Re-enable any accounts that were locked out as a defensive measure once the source is contained."
references:
    - https://attack.mitre.org/techniques/T1110/003/

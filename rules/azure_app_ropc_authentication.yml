title: Applications That Are Using ROPC Authentication Flow
id: 55695bc0-c8cf-461f-a379-2535f563c854
status: test
description: |
    Resource owner password credentials (ROPC) should be avoided if at all possible as this requires the user to expose their current password credentials to the application directly.
    The application then uses those credentials to authenticate the user against the identity provider.
references:
    - https://learn.microsoft.com/en-us/entra/architecture/security-operations-applications#application-authentication-flows
author: Mark Morowczynski '@markmorow', Bailey Bercik '@baileybercik'
date: 2022-06-01
tags:
    - attack.stealth
    - attack.t1078
    - attack.persistence
    - attack.privilege-escalation
    - attack.initial-access
logsource:
    product: azure
    service: signinlogs
detection:
    selection:
        properties.message: ROPC
    condition: selection
falsepositives:
    - Applications that are being used as part of automated testing or a legacy application that cannot use any other modern authentication flow
level: medium
severity_justification: >
    ROPC itself is a legitimate (if discouraged) auth flow, not proof of compromise,
    so this doesn't warrant high/critical on its own. It's medium rather than low
    because the flow requires the application to directly handle the user's plaintext
    password, meaning a compromised or malicious application using ROPC gets a
    reusable credential rather than a scoped token - worth surfacing for review even
    absent other signals of abuse.
test_cases:
    - description: Sign-in log entry for an application using the ROPC flow
      should_match: true
      log:
          properties.message: "ROPC"
    - description: Sign-in log entry for a standard interactive/modern auth flow
      should_match: false
      log:
          properties.message: "Interactive"
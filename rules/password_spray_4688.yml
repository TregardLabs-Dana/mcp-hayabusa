title: Password Spraying Attempt via Known Offensive Tooling
id: 1cf0b251-f1d5-41df-a87e-398a1c84e7bb
status: experimental
description: |
    Detects process creation command lines invoking well-known password-spraying
    tools and scripts (DomainPasswordSpray, MSOLSpray, TREVORspray, o365spray,
    Spray365, kerbrute's passwordspray mode) - tools that try one common or
    weak password against many different accounts to find valid credentials
    while staying under per-account lockout thresholds. The spray pattern
    itself (many distinct accounts, one source, short window) is better
    detected by aggregating EventID 4625 failures via a Sigma correlation
    rule, but Hayabusa's bundled ruleset has no correlation-type rules yet
    and this knowledge base has no precedent for that rule format, so this
    rule instead flags the offensive tooling most commonly used to run the
    technique.
references:
    - https://attack.mitre.org/techniques/T1110/003/
    - https://github.com/dafthack/DomainPasswordSpray
    - https://github.com/dafthack/MSOLSpray
    - https://github.com/blacklanternsecurity/TREVORspray
    - https://github.com/gremwell/o365spray
author: detection-engineering-lab
date: 2026-07-18
modified: 2026-07-18
tags:
    - attack.credential-access
    - attack.t1110.003
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4688
        CommandLine|contains:
            - 'Invoke-DomainPasswordSpray'
            - 'DomainPasswordSpray.ps1'
            - 'Invoke-MSOLSpray'
            - 'MSOLSpray.py'
            - 'TREVORspray'
            - 'o365spray'
            - 'Spray365'
            - 'kerbrute passwordspray'
    condition: selection
falsepositives:
    - Authorized password-spray assessments run by internal red teams or pentesters
    - Security-awareness or purple-team tooling that references these tool names in test scripts
level: medium

# Example environment inventory for this lab/course project. Replace with
# your real host inventory - hostnames, IPs, and roles below are
# illustrative, not a real network. Each entry uses either "hostname" (a
# single named host) or "hostname_pattern" (a glob for a whole fleet, e.g.
# workstations) so the file doesn't need one line per machine.
hosts:
  - hostname: DC01
    role: domain-controller
    ip: 10.0.10.11
    os: Windows Server 2022
    criticality: critical
    owner: Identity/AD Team
    notes: Primary domain controller; holds all FSMO roles.

  - hostname: DC02
    role: domain-controller
    ip: 10.0.10.12
    os: Windows Server 2022
    criticality: critical
    owner: Identity/AD Team
    notes: Secondary domain controller.

  - hostname: FS01
    role: file-server
    ip: 10.0.20.15
    os: Windows Server 2019
    criticality: high
    owner: IT Infrastructure
    notes: Hosts Finance/HR department file shares; admin-share (ADMIN$/C$) access should only originate from JUMP01.

  - hostname: MAIL01
    role: mail-server
    ip: 10.0.20.20
    os: Exchange Server 2019
    criticality: high
    owner: IT Infrastructure
    notes: Internal mail server; internet-facing via a reverse proxy, not directly exposed.

  - hostname: JUMP01
    role: jump-box
    ip: 10.0.30.5
    os: Windows Server 2022
    criticality: high
    owner: IT Infrastructure
    notes: Sole approved origin for interactive/RDP admin sessions to servers; any admin logon to a server from elsewhere is suspicious.

  - hostname_pattern: "WKSTN-*"
    role: workstation
    ip_range: 10.0.40.0/24
    os: Windows 11
    criticality: medium
    owner: End User Computing
    notes: Standard end-user workstation fleet; domain-joined, Kerberos-only (NTLM restricted).

  - hostname_pattern: "SVR-APP*"
    role: application-server
    ip_range: 10.0.50.0/24
    os: Windows Server 2022
    criticality: medium
    owner: App Platform Team
    notes: Line-of-business application servers; service accounts should only authenticate here, not interactively.
